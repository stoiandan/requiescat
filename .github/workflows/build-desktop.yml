name: Build desktop apps

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  windows:
    name: Windows MSI
    runs-on: windows-latest
    env:
      WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
      WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
    permissions:
      contents: read
      id-token: write
      attestations: write

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Read package version
        shell: bash
        run: |
          APP_VERSION="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          echo "APP_VERSION=${APP_VERSION}" >> "$GITHUB_ENV"

      - name: Build release executable
        run: cargo build --locked --release --bin requiescat --bin requiescat-updater

      - name: Sign Windows executables
        if: env.WINDOWS_CERTIFICATE != ''
        shell: pwsh
        run: |
          $certificate = Join-Path $env:RUNNER_TEMP "requiescat-signing.pfx"
          [IO.File]::WriteAllBytes(
            $certificate,
            [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE)
          )
          $signTool = Get-ChildItem `
            "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe" |
            Sort-Object FullName |
            Select-Object -Last 1
          foreach ($executable in @(
            "target/release/requiescat.exe",
            "target/release/requiescat-updater.exe"
          )) {
            & $signTool.FullName sign `
              /fd SHA256 `
              /f $certificate `
              /p $env:WINDOWS_CERTIFICATE_PASSWORD `
              /tr http://timestamp.digicert.com `
              /td SHA256 `
              $executable
          }
          Remove-Item $certificate -Force

      - name: Install WiX Toolset
        run: dotnet tool install --global wix --version 5.0.2

      - name: Build MSI
        shell: pwsh
        run: |
          wix build packaging/windows/Product.wxs `
            -arch x64 `
            -d Version="$($env:APP_VERSION).0" `
            -d BinDir="target/release" `
            -d SourceDir="." `
            -o requiescat-windows-x86_64.msi

      - name: Sign Windows MSI
        if: env.WINDOWS_CERTIFICATE != ''
        shell: pwsh
        run: |
          $certificate = Join-Path $env:RUNNER_TEMP "requiescat-signing.pfx"
          [IO.File]::WriteAllBytes(
            $certificate,
            [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE)
          )
          $signTool = Get-ChildItem `
            "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe" |
            Sort-Object FullName |
            Select-Object -Last 1
          & $signTool.FullName sign `
            /fd SHA256 `
            /f $certificate `
            /p $env:WINDOWS_CERTIFICATE_PASSWORD `
            /tr http://timestamp.digicert.com `
            /td SHA256 `
            requiescat-windows-x86_64.msi
          Remove-Item $certificate -Force

      - name: Upload Windows package
        uses: actions/upload-artifact@v7
        with:
          name: requiescat-windows-x86_64-msi
          path: requiescat-windows-x86_64.msi
          if-no-files-found: error

      - name: Attest Windows package
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: requiescat-windows-x86_64.msi

  macos:
    name: macOS Apple Silicon app
    runs-on: macos-latest
    permissions:
      contents: read
      id-token: write
      attestations: write

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Install Rust target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Read package version
        run: |
          APP_VERSION="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          echo "APP_VERSION=${APP_VERSION}" >> "$GITHUB_ENV"

      - name: Build Apple Silicon executables
        run: cargo build --locked --release --target aarch64-apple-darwin

      - name: Create Apple Silicon app bundle
        run: |
          APP="dist/Requiescat.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"

          cp target/aarch64-apple-darwin/release/requiescat \
            "$APP/Contents/MacOS/requiescat"
          cp target/aarch64-apple-darwin/release/requiescat-updater \
            "$APP/Contents/MacOS/requiescat-updater"

          cp packaging/macos/Info.plist "$APP/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c \
            "Set :CFBundleShortVersionString $APP_VERSION" \
            "$APP/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c \
            "Set :CFBundleVersion ${GITHUB_RUN_NUMBER}" \
            "$APP/Contents/Info.plist"
          cp packaging/icons/requiescat.icns \
            "$APP/Contents/Resources/requiescat.icns"
          cp LICENSE "$APP/Contents/Resources/LICENSE"
          chmod +x "$APP/Contents/MacOS/requiescat" \
            "$APP/Contents/MacOS/requiescat-updater"

          plutil -lint "$APP/Contents/Info.plist"
          file "$APP/Contents/MacOS/requiescat"
          file "$APP/Contents/MacOS/requiescat-updater"

      - name: Ad-hoc sign macOS app
        run: |
          for executable in \
            dist/Requiescat.app/Contents/MacOS/requiescat \
            dist/Requiescat.app/Contents/MacOS/requiescat-updater
          do
            codesign --force --verbose \
              --sign - \
              "$executable"
          done

          codesign --force --verbose \
            --sign - \
            dist/Requiescat.app

          codesign --verify --deep --strict --verbose=2 dist/Requiescat.app

      - name: Package macOS app
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            dist/Requiescat.app requiescat-macos-aarch64.zip

      - name: Upload macOS package
        uses: actions/upload-artifact@v7
        with:
          name: requiescat-macos-aarch64
          path: requiescat-macos-aarch64.zip
          if-no-files-found: error

      - name: Attest macOS package
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: requiescat-macos-aarch64.zip

  linux:
    name: Linux Flatpak
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Install Flatpak tooling
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            flatpak \
            flatpak-builder
          flatpak remote-add --if-not-exists --user flathub \
            https://flathub.org/repo/flathub.flatpakrepo
          flatpak install --noninteractive --user flathub \
            org.freedesktop.Platform//24.08 \
            org.freedesktop.Sdk//24.08 \
            org.freedesktop.Sdk.Extension.rust-stable//24.08

      - name: Read package version
        run: |
          APP_VERSION="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          echo "APP_VERSION=${APP_VERSION}" >> "$GITHUB_ENV"

      - name: Stamp Linux app metadata version
        run: |
          RELEASE_DATE="$(date -u +%F)"
          sed -i \
            "s#</component>#  <releases>\\n    <release version=\"${APP_VERSION}\" date=\"${RELEASE_DATE}\"/>\\n  </releases>\\n</component>#" \
            packaging/linux/app.requiescat.metainfo.xml

      - name: Build Flatpak bundle
        run: |
          flatpak-builder \
            --force-clean \
            --user \
            --default-branch=stable \
            --repo=flatpak-repo \
            flatpak-build \
            packaging/linux/app.requiescat.yml
          flatpak build-bundle \
            flatpak-repo \
            requiescat-linux-x86_64.flatpak \
            app.requiescat.org \
            stable

      - name: Upload Linux package
        uses: actions/upload-artifact@v7
        with:
          name: requiescat-linux-x86_64-flatpak
          path: requiescat-linux-x86_64.flatpak
          if-no-files-found: error

      - name: Attest Linux package
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: requiescat-linux-x86_64.flatpak

  release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [windows, macos, linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Download platform packages
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: Validate release version
        run: |
          APP_VERSION="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$TAG_VERSION" != "$APP_VERSION" ]; then
            echo "Tag version $TAG_VERSION does not match Cargo.toml $APP_VERSION" >&2
            exit 1
          fi
          echo "APP_VERSION=${APP_VERSION}" >> "$GITHUB_ENV"

      - name: Build release manifest
        env:
          REPOSITORY: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          cd release-assets
          WINDOWS_SHA="$(sha256sum requiescat-windows-x86_64.msi | cut -d' ' -f1)"
          MACOS_SHA="$(sha256sum requiescat-macos-aarch64.zip | cut -d' ' -f1)"
          LINUX_SHA="$(sha256sum requiescat-linux-x86_64.flatpak | cut -d' ' -f1)"
          BASE_URL="https://github.com/${REPOSITORY}/releases/download/${TAG}"

          jq -n \
            --arg version "$APP_VERSION" \
            --arg notes_url "https://github.com/${REPOSITORY}/releases/tag/${TAG}" \
            --rawfile description_en ../packaging/release-notes/en.md \
            --rawfile description_ro ../packaging/release-notes/ro.md \
            --arg base_url "$BASE_URL" \
            --arg windows_sha "$WINDOWS_SHA" \
            --arg macos_sha "$MACOS_SHA" \
            --arg linux_sha "$LINUX_SHA" \
            '{
              version: $version,
              notes_url: $notes_url,
              descriptions: {
                en: ($description_en | rtrimstr("\n")),
                ro: ($description_ro | rtrimstr("\n"))
              },
              assets: {
                "windows-msi-x86_64": {
                  url: ($base_url + "/requiescat-windows-x86_64.msi"),
                  sha256: $windows_sha,
                  file_name: "requiescat-windows-x86_64.msi",
                  format: "msi"
                },
                "macos-aarch64": {
                  url: ($base_url + "/requiescat-macos-aarch64.zip"),
                  sha256: $macos_sha,
                  file_name: "requiescat-macos-aarch64.zip",
                  format: "zip"
                },
                "linux-flatpak-x86_64": {
                  url: ($base_url + "/requiescat-linux-x86_64.flatpak"),
                  sha256: $linux_sha,
                  file_name: "requiescat-linux-x86_64.flatpak",
                  format: "flatpak"
                }
              }
            }' > release-manifest.json

      - name: Attest release manifest
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: release-assets/release-manifest.json

      - name: Publish release and assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" release-assets/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" release-assets/* \
              --title "Requiescat ${APP_VERSION}" \
              --generate-notes \
              --verify-tag
          fi
